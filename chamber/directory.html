<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chamber of Commerce</title>
  <meta name="description" content="Directory of member businesses for Enugu City Chamber of Commerce">
  <meta name="author" content="Daniel Chinagorom">

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Facebook / Open Graph meta -->
  <meta property="og:title" content="Enugu City Chamber Directory">
  <meta property="og:description" content="Find local businesses and chamber members in Example City.">
  <meta property="og:image" content="images/business1.svg">
  <meta property="og:url" content="https://example.com/chamber/directory.html">

  <!-- CSS: normalize first, then small, then larger -->
  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">
</head>

<body>
  <header class="site-header">
    <div class="inner">
      <img src="images/Logo-Enugu.webp" alt="Enugu Chamber of Commerce logo" class="logo">
      <nav class="main-nav" aria-label="Main Navigation">
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
          <span class="hamburger" aria-hidden="true"></span>
          <span class="visually-hidden">Menu</span>
        </button>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="directory.html">Directory</a></li>
          <li><a href="discover.html">Discover</a></li>
          <li><a href="join.html">Join</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    
    <section>
      <div class="view-toggle">
        <button id="gridBtn" aria-pressed="true">Grid View</button>
        <button id="listBtn" aria-pressed="false">List View</button>
      </div>
      <div class="filter">Membership: <select id="levelFilter">
          <option value="all">All</option>
          <option value="3">Gold</option>
          <option value="2">Silver</option>
          <option value="1">Member</option>
      </div>

      <div class="search">
        <label for="searchInput" class="visually-hidden">Search members</label>
        <input id="searchInput" type="search" placeholder="Search businesses, address, notes"
          aria-label="Search members">
      </div>
      <div class="results-summary" aria-live="polite">Found: <span id="resultCount">--</span></div>
    </section>

    <section id="directory" class="directory" aria-live="polite">
      <!-- Members will be injected here -->
    </section>
  </main>

  <footer class="site-footer">
    <ul class="social-links">
      <a href="https://www.facebook.com/ECCIMA" target="_blank" rel="noopener"></a>
      <img src="images/facebook.png" alt="Facebook logo" width="50" height="50">
      <a href="https://www.linkedin.com/company/eccima" target="_blank" rel="noopener"></a>
      <img src="images/linkedin.svg" alt="Linkedin logo" width="50" height="50">
      <a href="https://www.twitter.com/eccima" target="_blank" rel="noopener"></a>
      <img src="images/twitter.png" alt="Twitter logo" width="50" height="50">
    </ul>
    <div class="bottom-footer">
      <p>Contact: Daniel Chinagorom &middot; WDD 231</p>
      <p>Last modified: <span id="lastModified">(loading)</span></p>
    </div>
  </footer>

  <script src="js/main.js" type="module"></script>
</body>

</html>
